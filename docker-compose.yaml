services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: proyekto
      POSTGRES_PASSWORD: proyekto
      POSTGRES_DB: proyekto
    ports: ["5432:5432"]
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proyekto"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5
  api:
    build: { context: ., dockerfile: apps/api/Dockerfile }
    ports: ["8000:8000"]
    env_file:
      - apps/api/.env.local
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build: { context: ., dockerfile: apps/web/Dockerfile }
    ports: ["3000:3000"]
    env_file:
      - apps/web/.env.local
    depends_on:
      - api

volumes:
  db_data:
