services:
  api:
    build: { context: ., dockerfile: apps/api/Dockerfile }
    ports: ["8000:8000"]
    env_file:
      - apps/api/.env.local

  web:
    build: { context: ., dockerfile: apps/web/Dockerfile }
    ports: ["3000:3000"]
    env_file:
      - apps/web/.env.local
    depends_on:
      - api
