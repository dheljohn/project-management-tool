# Local Docker Compose — uses Neon (DB) and Upstash (Redis) online services.
# No local Postgres or Redis containers needed.
#
# Setup:
#   cp .env.example .env
#   Fill in the values in .env
#   docker compose up --build

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      args:
        # DATABASE_URL is passed as a build arg so prisma generate works during docker build.
        DATABASE_URL: ${DATABASE_URL}
    ports:
      - "8000:8000"
    environment:
      NODE_ENV: production
      PORT: "8000"
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      TEST_SECRET: ${TEST_SECRET}
      # For local Docker: frontend is on localhost:3000
      # For pointing at Vercel: https://proyekto-blue.vercel.app
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # NEXT_PUBLIC_API_URL is baked in at build time by Next.js.
        # For local Docker: http://localhost:8000
        # For pointing at Render: https://proyekto.onrender.com
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      # JWT_ACCESS_SECRET is read server-side by the Next.js middleware
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      API_URL: ${DOCKER_API}
    depends_on:
      - api
